<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Github We </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        nav {
            margin: 10px 0;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }
        section {
            margin: 20px 0;
        }
        section h2 {
            margin-bottom: 10px;
            color: #444;
        }
        .projects {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .project {
            background: white;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: calc(33.333% - 20px);
            box-sizing: border-box;
            transition: transform 0.3s;
        }
        .project:hover {
            transform: scale(1.05);
        }
        .project img {
            max-width: 100%;
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            padding: 10px 0;
            background-color: #333;
            color: white;
        }
        @media (max-width: 768px) {
            .project {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Github Website</h1>
    <nav>
        <a href="#about">About Me</a>
        <a href="#projects">My Note</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<div class="container">
    <section id="about">
        <h2>About Me</h2>
        <p>Hello! I am Tint Naing Htun, a xxxxccccc. I specialize in my carrier. With a passion for creating innovative solutions, I aim to make an impact through my work.</p>
    </section>

   

</body>
</html>
